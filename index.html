<title>Calculando tu diagnóstico — RRHH en Foco</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --blue: #0097A7;
  --green: #A8C400;
  --yellow: #F5C200;
  --white: #FFFFFF;
  --gray: #666666;
}
body {
  font-family: 'Open Sans', sans-serif;
  background: var(--white);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.site-header {
  background: var(--blue);
  position: relative;
  height: 60px;
  overflow: hidden;
}
.site-header img.header-img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: left center;
}
.site-header .logo-wrap {
  position: absolute;
  left: 1.5rem; top: 50%;
  transform: translateY(-50%);
}
.site-header .logo-wrap img {
  height: 28px; width: auto;
  filter: brightness(0) invert(1);
}
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem;
  text-align: center;
}
.spinner-wrap {
  margin-bottom: 2rem;
  position: relative;
  width: 72px; height: 72px;
}
.spinner-outer {
  width: 72px; height: 72px;
  border: 4px solid #E0EEEF;
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  position: absolute;
}
.spinner-inner {
  width: 48px; height: 48px;
  border: 3px solid #F0F8F8;
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.6s linear infinite reverse;
  position: absolute;
  top: 12px; left: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
h1 {
  font-size: 1.4rem;
  font-weight: 300;
  color: #333;
  margin-bottom: 0.6rem;
  line-height: 1.3;
}
h1 strong { font-weight: 700; color: var(--blue); }
p {
  font-size: 0.88rem;
  color: var(--gray);
  font-weight: 300;
  line-height: 1.6;
  max-width: 340px;
}
.progress-bar {
  width: 280px;
  height: 4px;
  background: #E0EEEF;
  border-radius: 999px;
  margin: 2rem auto 0;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--green));
  border-radius: 999px;
  width: 0%;
  animation: progress 2.8s ease forwards;
}
@keyframes progress {
  0%   { width: 0%; }
  60%  { width: 70%; }
  90%  { width: 90%; }
  100% { width: 100%; }
}
footer {
  background: #333;
  padding: 1.25rem;
  text-align: center;
}
footer p {
  color: rgba(255,255,255,0.4);
  font-size: 0.75rem;
}
footer a { color: rgba(255,255,255,0.55); text-decoration: none; }
</style>
</head>
